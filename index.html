<html>
  <head>
    <title>Kuis Game 2 - Dijkstra Pathfinder</title>
    <script src="https://cdn.jsdelivr.net/phaser/2.2.2/phaser.min.js" type="text/javascript"></script>
    <script src="js/lib/phaser.min.js" type="text/javascript"></script>
    <script src="js/blocklist.js" type="text/javascript"></script>
    <script src="js/blockstate.js" type="text/javascript"></script>
    <script src="js/config.js" type="text/javascript"></script>
    <script src="js/depths.js" type="text/javascript"></script>
    <script src="js/directorstate.js" type="text/javascript"></script>
    <script src="js/grid.js" type="text/javascript"></script>
    <script src="js/gridrunner.js" type="text/javascript"></script>
    <script src="js/dijkstra.js" type="text/javascript"></script>
    <script src="js/dijkstradisplay.js" type="text/javascript"></script>
    <script src="js/main.js" type="text/javascript"></script>
    <script src="js/patty.js" type="text/javascript"></script>
    <script src="js/santa.js" type="text/javascript"></script>
    <script src="js/victorycutscene.js" type="text/javascript"></script>
    <script src="js/world.js" type="text/javascript"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        background-color: black;
        font-family: monospace;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="instructions" style="color: white; position: absolute; left: 10px; top: 10px; font-family: monospace; display: none; background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 5px;">
      <h2>Dijkstra Pathfinder Game</h2>
      <p>Instructions:</p>
      <ul>
        <li><strong>Setup Phase:</strong></li>
        <li>Arrow Keys - Move Patty (the girl character)</li>
        <li>Use Patty to push crates around</li>
        <li><strong>G - START</strong> Calculate & display path, Santa walks!</li>
        <li style="margin-top: 10px;"><strong>Calculation Phase:</strong></li>
        <li>R - Reset puzzle (back to setup)</li>
        <li>I - Toggle instructions</li>
      </ul>
    </div>
  </body>
